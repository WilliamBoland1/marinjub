<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marin Teknikk 110-år</title>

  <!-- Fonts: high-contrast serif for display, clean sans for labels -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050b14;
      --ink: #eef3fa;
      --accent: #5b82c4;
      --accent-dim: #3d5a8a;
      --watermark: #1e2f4d;
      --glow: rgba(91, 130, 196, 0.16);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
    }

    /* ---- Giant watermark letters behind everything ---- */
    .watermark {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: clamp(10rem, 40vw, 30rem);
      letter-spacing: 0.12em;
      color: var(--bg);
      text-shadow:
        0 0 50px rgba(91, 130, 196, 0.13),
        0 0 120px rgba(91, 130, 196, 0.06);
      user-select: none;
      pointer-events: none;
      line-height: 1;
      z-index: 0;
    }

    .watermark span { margin-right: -0.12em; }


    /* ---- Main content ---- */
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      padding-bottom: 3.5rem; /* offsets eyebrow height so countdown center = viewport center */
      width: 100%;
      max-width: 1200px;
    }

    .eyebrow {
      position: relative;
      top: -1rem;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.2s forwards;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: clamp(2.6rem, 7vw, 6rem);
      line-height: 1.05;
      margin-bottom: 4.5rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.4s forwards;
    }

    /* ---- Countdown ---- */
    .countdown {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: clamp(0.8rem, 4vw, 3.5rem);
      margin-bottom: 4.5rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.6s forwards;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: clamp(3.5rem, 12vw, 9rem);
    }

    .unit .value {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(3.2rem, 10vw, 8.5rem);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .unit .label {
      margin-top: 1rem;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #93a6c2;
    }

    .separator {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      padding-top: clamp(1rem, 3.5vw, 3rem);
    }

    .separator span {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent-dim);
    }

    /* ---- Footer line ---- */
    /* top: 50% = vertical center of viewport (where NTH is centered)
       + half the NTH font-size = bottom edge of the NTH letters
       + small gap */
    .footer {
      position: absolute;
      top: calc(50% + clamp(5rem, 20vw, 15rem) + 1.5rem);
      left: 0;
      right: 0;
      text-align: center;
      z-index: 2;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.8s forwards;
    }

    .footer hr {
      border: none;
      border-top: 1px solid rgba(147, 166, 194, 0.25);
      width: 160px;
      margin: 0 auto 1.6rem;
    }

    .footer p {
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .footer .dates {
      margin-bottom: 0.6rem;
    }

    /* ---- Bottom links (Info / Kontakt oss) ---- */
    .bottom-links {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 1.6rem 1rem calc(2.2rem + env(safe-area-inset-bottom));
      background: var(--bg);
      display: flex;
      justify-content: center;
      gap: 2rem;
      z-index: 3;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.9s ease 1s forwards;
    }

    .bottom-links a {
      color: rgba(147, 166, 194, 0.55);
      text-decoration: underline;
      text-underline-offset: 4px;
      transition: color 0.2s ease;
    }

    .bottom-links a:hover,
    .bottom-links a:focus-visible {
      color: var(--ink);
    }

    /* ---- Corner social links ---- */
    .social-links {
      position: fixed;
      top: clamp(0.9rem, 3vh, 1.75rem);
      right: clamp(0.9rem, 3vw, 1.75rem);
      z-index: 3;
      display: flex;
      gap: clamp(0.7rem, 2vw, 1.1rem);
      opacity: 0;
      animation: fadeUp 0.9s ease 0.2s forwards;
    }
    .social-links a {
      display: flex;
      color: rgba(147, 166, 194, 0.55);
      transition: color 0.2s ease;
    }
    .social-links a:hover,
    .social-links a:focus-visible { color: var(--ink); }
    .social-links svg {
      width: clamp(18px, 2.4vw, 22px);
      height: clamp(18px, 2.4vw, 22px);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .eyebrow, h1, .countdown, .footer, .bottom-links, .social-links {
        animation: none;
        opacity: 1;
      }
    }

    /* ---- Mobile tweaks ---- */
    @media (max-width: 600px) {
      .separator span { width: 6px; height: 6px; }
      .separator { gap: 0.6rem; }
      h1 { margin-bottom: 3rem; }
      .countdown { margin-bottom: 3rem; }
      .watermark { font-size: clamp(6.5rem, 38vw, 14rem); }
      .footer {
        padding-bottom: 2.5rem;
        top: calc(50% + clamp(6.5rem, 38vw, 14rem) / 2 + 1.5rem);
      }
    }

    /* ---- Small phones: prevent the countdown row from overflowing ---- */
    @media (max-width: 420px) {
      .content { padding-left: 1rem; padding-right: 1rem; }
      .countdown { gap: 0.5rem; }
      .unit { min-width: 2.4rem; }
      .unit .value { font-size: 2.2rem; }
      .unit .label { font-size: 0.6rem; letter-spacing: 0.2em; margin-top: 0.6rem; }
      .separator { gap: 0.5rem; padding-top: 0.7rem; }
      .bottom-links { font-size: 0.62rem; letter-spacing: 0.25em; gap: 1.2rem; }
    }

    /* ---- Landscape phones: shrink vertical rhythm so countdown + footer + bottom-links
       don't collide when height is short (covers phone landscape heights ~320-430px;
       tablets stay >= 500px and keep the desktop-scaled layout) ---- */
    @media (orientation: landscape) and (max-height: 500px) {
      .content { padding: 1rem 1rem 1.75rem; }
      .eyebrow { margin-bottom: 1rem; }
      h1 {
        font-size: clamp(1.8rem, 6vh, 3rem);
        margin-bottom: 1.5rem;
      }
      .countdown {
        margin-bottom: 1.5rem;
        gap: clamp(0.5rem, 2vw, 1.5rem);
      }
      .unit { min-width: 2.8rem; }
      .unit .value { font-size: clamp(2rem, 9vh, 4rem); }
      .unit .label { margin-top: 0.4rem; font-size: 0.62rem; letter-spacing: 0.2em; }
      .separator { gap: 0.5rem; padding-top: 0.6rem; }
      .watermark { font-size: clamp(5rem, 34vh, 11rem); }
      .footer {
        top: calc(50% + clamp(5rem, 34vh, 11rem) / 2 + 0.8rem);
        padding-bottom: 1rem;
      }
      .footer hr { margin-bottom: 0.8rem; }
      .footer p { font-size: 0.68rem; letter-spacing: 0.3em; }
      .bottom-links {
        padding: 0.6rem 1rem calc(0.8rem + env(safe-area-inset-bottom));
        font-size: 0.62rem;
        gap: 1.2rem;
      }
    }

    /* ---- Shortest phones (e.g. iPhone SE landscape, 320px tall): the block above
       still leaves the footer touching the bottom-links bar, so tighten further ---- */
    @media (orientation: landscape) and (max-height: 360px) {
      .footer {
        top: calc(50% + clamp(5rem, 34vh, 11rem) / 2 + 0.4rem);
        padding-bottom: 0.5rem;
      }
      .footer hr { margin-bottom: 0.4rem; }
      .footer p { font-size: 0.6rem; }
      .bottom-links {
        padding: 0.4rem 1rem calc(0.5rem + env(safe-area-inset-bottom));
        font-size: 0.56rem;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="watermark" aria-hidden="true"><span>NTH</span></div>

  <div class="social-links">
    <a href="https://www.instagram.com/jub110_mannhullet/" target="_blank" rel="noopener" aria-label="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
    </a>
    <a href="https://www.facebook.com/people/110-%C3%A5rs-jubileum-Mannhullet/61590599620480/" target="_blank" rel="noopener" aria-label="Facebook">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>
    </a>
    <a href="https://www.strava.com/athletes/134381213" target="_blank" rel="noopener" aria-label="Strava">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 2 11 13 14.5 13 10.5 22 17 10 13.5 10 17 2"></polyline></svg>
    </a>
  </div>

  <main class="content">
    <p class="eyebrow">Marin Teknikk 110-år</p>

    <div class="countdown" role="timer" aria-live="polite">
      <div class="unit">
        <span class="value" id="days">00</span>
        <span class="label">Dager</span>
      </div>
      <div class="separator" aria-hidden="true"><span></span><span></span></div>
      <div class="unit">
        <span class="value" id="hours">00</span>
        <span class="label">Timer</span>
      </div>
      <div class="separator" aria-hidden="true"><span></span><span></span></div>
      <div class="unit">
        <span class="value" id="minutes">00</span>
        <span class="label">Minutter</span>
      </div>
      <div class="separator" aria-hidden="true"><span></span><span></span></div>
      <div class="unit">
        <span class="value" id="seconds">00</span>
        <span class="label">Sekunder</span>
      </div>
    </div>

  </main>

  <div class="footer">
    <hr>
    <p class="dates">29. januar – 6. februar</p>
    <p>Hold av datoen</p>
  </div>

  <div class="bottom-links">
    <a href="om-jubileet.html">Om jubileet</a>
    <a href="kontakt.html">Kontakt oss</a>
  </div>

  <script>
    // ============================================
    //  CHANGE THIS to your event date and time
    // ============================================
    const TARGET_DATE = new Date('2027-01-29T00:00:00+01:00');

    const els = {
      days: document.getElementById('days'),
      hours: document.getElementById('hours'),
      minutes: document.getElementById('minutes'),
      seconds: document.getElementById('seconds'),
    };

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function tick() {
      const diff = TARGET_DATE - new Date();

      if (diff <= 0) {
        els.days.textContent = '00';
        els.hours.textContent = '00';
        els.minutes.textContent = '00';
        els.seconds.textContent = '00';
        clearInterval(timer);
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      els.days.textContent = pad(Math.floor(totalSeconds / 86400));
      els.hours.textContent = pad(Math.floor((totalSeconds % 86400) / 3600));
      els.minutes.textContent = pad(Math.floor((totalSeconds % 3600) / 60));
      els.seconds.textContent = pad(totalSeconds % 60);
    }

    tick();
    const timer = setInterval(tick, 1000);
  </script>

</body>
</html>
