<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt oss — Marin Teknikk 110 år</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050b14;
      --bg-soft: #091125;
      --ink: #eef3fa;
      --muted: #93a6c2;
      --accent: #5b82c4;
      --accent-dim: #3d5a8a;
      --line: rgba(147, 166, 194, 0.18);
      --watermark: #1e2f4d;
      --glow: rgba(91, 130, 196, 0.16);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      position: relative;
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .watermark {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: clamp(10rem, 40vw, 30rem);
      letter-spacing: 0.12em;
      color: var(--bg);
      text-shadow:
        0 0 50px rgba(91, 130, 196, 0.13),
        0 0 120px rgba(91, 130, 196, 0.06);
      user-select: none;
      pointer-events: none;
      line-height: 1;
      z-index: 0;
    }

    .watermark span { margin-right: -0.12em; }

    .wrap {
      position: relative;
      z-index: 2;
      flex: 1;
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      padding: clamp(3rem, 22vh, 10.5rem) clamp(1.5rem, 6vw, 2rem) clamp(0.5rem, 2vh, 1.5rem);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      min-height: 0;
      overflow: hidden;
    }

    /* ---- Corner brand mark: fixed to the true viewport corner, not the centered column ---- */
    .header-logo {
      position: fixed;
      top: clamp(0.9rem, 3vh, 1.75rem);
      left: clamp(0.9rem, 3vw, 1.75rem);
      display: block;
      width: clamp(38px, 5vw, 54px);
      height: auto;
      z-index: 3;
      filter: drop-shadow(0 0 30px rgba(91, 130, 196, 0.18));
    }

    .welcome { text-align: center; margin-bottom: clamp(0.8rem, 2.5vh, 1.5rem); }
    .welcome .eyebrow {
      font-size: 0.72rem; font-weight: 500;
      letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--accent); margin-bottom: clamp(0.6rem, 1.6vh, 1rem);
    }
    .welcome h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: clamp(1.7rem, 5vh, 3rem);
      line-height: 1.08; margin-bottom: clamp(0.5rem, 1.5vh, 0.9rem);
    }
    .welcome p {
      max-width: 500px; margin: 0 auto;
      font-size: clamp(0.88rem, 2.2vh, 1.1rem);
      color: #c3d0e2;
    }

    .people {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(0.6rem, 2vw, 1.1rem);
    }
    .person {
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: clamp(0.9rem, 3vh, 2rem) clamp(0.7rem, 2vw, 1.5rem) clamp(0.8rem, 2.5vh, 1.8rem);
      text-align: center;
      transition: border-color 0.2s ease, transform 0.15s ease;
    }
    .person:hover { border-color: var(--accent-dim); transform: translateY(-3px); }

    /* Avatar: to use a real photo, add  style="background-image:url('bilde.jpg')"
       to .avatar and delete the "?" inside it. */
    .avatar {
      width: clamp(46px, 10vh, 92px); height: clamp(46px, 10vh, 92px);
      margin: 0 auto clamp(0.5rem, 1.6vh, 1.1rem);
      border-radius: 50%;
      background-color: #16223a;
      background-size: cover; background-position: center;
      border: 1px solid var(--accent-dim);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-weight: 700; font-size: 1.9rem; color: var(--accent);
      overflow: hidden;
    }
    .person .role {
      font-size: clamp(0.56rem, 1.3vh, 0.68rem); letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--accent); margin-bottom: clamp(0.3rem, 1vh, 0.5rem);
    }
    .person h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 700; font-size: clamp(0.95rem, 2.4vh, 1.3rem); margin-bottom: clamp(0.4rem, 1.2vh, 0.9rem);
    }
    .person a.mail {
      display: inline-block;
      color: var(--ink); text-decoration: none; font-size: clamp(0.68rem, 1.6vh, 0.9rem);
      border-bottom: 1px solid var(--accent-dim); padding-bottom: 2px;
      transition: border-color 0.2s ease; word-break: break-word;
    }
    .person a.mail:hover { border-color: var(--accent); }

    .bottom-nav {
      position: relative; z-index: 2; flex: none;
      padding: clamp(0.6rem, 2vh, 1.4rem) 1rem;
      display: flex; justify-content: center; gap: 2rem;
    }
    .bottom-nav a {
      color: rgba(147, 166, 194, 0.55);
      text-decoration: underline;
      text-underline-offset: 4px;
      font-size: 0.82rem; letter-spacing: 0.14em; text-transform: uppercase;
      transition: color 0.2s ease;
    }
    .bottom-nav a:hover { color: var(--ink); }

    :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 4px; }
    @media (max-width: 600px) { .watermark { font-size: clamp(6.5rem, 38vw, 14rem); } }
    @media (max-width: 480px) {
      .people { gap: 0.4rem; }
      .person { padding: 0.7rem 0.4rem 0.7rem; border-radius: 12px; }
    }

    /* ---- Entrance fade, matching the countdown page ---- */
    .header-logo, .welcome, .people, .bottom-nav {
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
    }
    .header-logo { animation-delay: 0.1s; }
    .welcome { animation-delay: 0.3s; }
    .people { animation-delay: 0.55s; }
    .bottom-nav { animation-delay: 0.8s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .header-logo, .welcome, .people, .bottom-nav {
        animation: none;
        opacity: 1;
      }
    }
  </style>
</head>
<body>

  <div class="watermark" aria-hidden="true"><span>NTH</span></div>

  <main class="wrap">

    <img class="header-logo" src="logo.png" alt="Mannhullet / NTH 110 år — 1917–2027">

    <header class="welcome">
      <p class="eyebrow">Kontakt oss</p>
      <h1>Hei! Hyggelig at du stakk innom</h1>
      <p>Finn riktig person under — vi håper å høre fra deg.</p>
    </header>

    <section class="people" aria-label="Kontaktpersoner">

      <div class="person">
        <div class="avatar" style="background-image:url('static/bilde (1).jpg')" aria-hidden="true"></div>
        <div class="role">Generelle henvendelser</div>
        <h3>[Navn]</h3>
        <a class="mail" href="mailto:jubkom-leder@mannhullet.no">jubkom-leder@mannhullet.no</a>
      </div>

      <div class="person">
        <div class="avatar" style="background-image:url('static/bilde (2).jpg')" aria-hidden="true"></div>
        <div class="role">Sponsing &amp; bedrift</div>
        <h3>[Navn]</h3>
        <a class="mail" href="mailto:jubkom-spons@mannhullet.no">jubkom-spons@mannhullet.no</a>
      </div>

      <div class="person">
        <div class="avatar" style="background-image:url('static/bilde (3).jpg')" aria-hidden="true"></div>
        <div class="role">Trøbbel med nettsiden</div>
        <h3>[Navn]</h3>
        <a class="mail" href="mailto:jubkom-web@mannhullet.no">jubkom-web@mannhullet.no</a>
      </div>

    </section>

  </main>

  <nav class="bottom-nav">
    <a href="countdown-110.html">Nedtelling</a>
    <a href="om-jubileet.html">Om jubileet</a>
  </nav>

</body>
</html>
