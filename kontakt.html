<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt oss — Marin Teknikk 110 år</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050b14;
      --bg-soft: #091125;
      --ink: #eef3fa;
      --muted: #93a6c2;
      --accent: #5b82c4;
      --accent-dim: #3d5a8a;
      --line: rgba(147, 166, 194, 0.18);
      --watermark: #1e2f4d;
      --glow: rgba(91, 130, 196, 0.16);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .watermark {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: clamp(18rem, 55vw, 44rem);
      color: var(--watermark);
      user-select: none; pointer-events: none;
      line-height: 1; z-index: 0; opacity: 0.55;
    }
    .glow {
      position: fixed; width: 480px; height: 480px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .glow--tl { top: -100px; left: -80px; }
    .glow--br { bottom: -140px; right: -100px; }

    .wrap {
      position: relative;
      z-index: 2;
      flex: 1;
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      padding: clamp(3rem, 8vw, 5.5rem) clamp(1.5rem, 6vw, 2rem) 2rem;
    }

    .welcome { text-align: center; margin-bottom: clamp(3rem, 8vw, 4.5rem); }
    .welcome .eyebrow {
      font-size: 0.78rem; font-weight: 500;
      letter-spacing: 0.36em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 1.1rem;
    }
    .welcome h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: clamp(2.2rem, 6.5vw, 3.6rem);
      line-height: 1.05; margin-bottom: 1.1rem;
    }
    .welcome p {
      max-width: 500px; margin: 0 auto;
      font-size: clamp(1.02rem, 2.2vw, 1.18rem);
      color: #c3d0e2;
    }

    .people {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.1rem;
    }
    .person {
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 2rem 1.5rem 1.8rem;
      text-align: center;
      transition: border-color 0.2s ease, transform 0.15s ease;
    }
    .person:hover { border-color: var(--accent-dim); transform: translateY(-3px); }

    /* Avatar: to use a real photo, add  style="background-image:url('bilde.jpg')"
       to .avatar and delete the "?" inside it. */
    .avatar {
      width: 92px; height: 92px;
      margin: 0 auto 1.1rem;
      border-radius: 50%;
      background-color: #16223a;
      background-size: cover; background-position: center;
      border: 1px solid var(--accent-dim);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-weight: 700; font-size: 1.9rem; color: var(--accent);
      overflow: hidden;
    }
    .person .role {
      font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 0.5rem;
    }
    .person h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 700; font-size: 1.3rem; margin-bottom: 0.9rem;
    }
    .person a.mail {
      display: inline-block;
      color: var(--ink); text-decoration: none; font-size: 0.9rem;
      border-bottom: 1px solid var(--accent-dim); padding-bottom: 2px;
      transition: border-color 0.2s ease; word-break: break-word;
    }
    .person a.mail:hover { border-color: var(--accent); }

    .bottom-nav {
      position: relative; z-index: 2;
      padding: 1.6rem 1rem 2.2rem;
      display: flex; justify-content: center; gap: 2rem;
    }
    .bottom-nav a {
      color: rgba(147, 166, 194, 0.55);
      text-decoration: underline;
      text-underline-offset: 4px;
      font-size: 0.82rem; letter-spacing: 0.14em; text-transform: uppercase;
      transition: color 0.2s ease;
    }
    .bottom-nav a:hover { color: var(--ink); }

    :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 4px; }
    @media (max-width: 560px) { .watermark { font-size: 12rem; } }
  </style>
</head>
<body>

  <div class="watermark" aria-hidden="true">NTH</div>
  <div class="glow glow--tl" aria-hidden="true"></div>
  <div class="glow glow--br" aria-hidden="true"></div>

  <main class="wrap">

    <header class="welcome">
      <p class="eyebrow">Kontakt oss</p>
      <h1>Hei! Hyggelig at du stakk innom</h1>
      <p>Finn riktig person under — vi håper å høre fra deg.</p>
    </header>

    <section class="people" aria-label="Kontaktpersoner">

      <div class="person">
        <div class="avatar" style="background-image:url('static/bilde (1).jpg')" aria-hidden="true"></div>
        <div class="role">Generelle henvendelser</div>
        <h3>[Navn]</h3>
        <a class="mail" href="mailto:jubkom-leder@mannhullet.no">jubkom-leder@mannhullet.no</a>
      </div>

      <div class="person">
        <div class="avatar" style="background-image:url('static/bilde (2).jpg')" aria-hidden="true"></div>
        <div class="role">Sponsing &amp; bedrift</div>
        <h3>[Navn]</h3>
        <a class="mail" href="mailto:jubkom-spons@mannhullet.no">jubkom-spons@mannhullet.no</a>
      </div>

      <div class="person">
        <div class="avatar" style="background-image:url('static/bilde (3).jpg')" aria-hidden="true"></div>
        <div class="role">Trøbbel med nettsiden</div>
        <h3>[Navn]</h3>
        <a class="mail" href="mailto:jubkom-web@mannhullet.no">jubkom-web@mannhullet.no</a>
      </div>

    </section>

  </main>

  <nav class="bottom-nav">
    <a href="countdown-110.html">Nedtelling</a>
    <a href="om-jubileet.html">Om jubileet</a>
  </nav>

</body>
</html>
